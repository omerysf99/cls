<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Çerçeveli Video ve Bakiye Sistemi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle, #1a1a1a 0%, #000000 100%);
            color: white;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }

        /* Video Çerçevesi */
        .video-frame {
            position: relative;
            width: 85%;
            max-width: 1000px;
            aspect-ratio: 16 / 9;
            background: #000;
            border-radius: 24px;
            padding: 12px;
            box-shadow: 0 0 60px rgba(74, 222, 128, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            /* Görseli arka plan olarak ayarla (video yüklenmezse görünür) */
            background-image: url('görsel.jpg');
            background-size: cover;
            background-position: center;
        }

        .video-frame:hover {
            transform: scale(1.01);
            box-shadow: 0 0 80px rgba(74, 222, 128, 0.25);
            border-color: rgba(74, 222, 128, 0.3);
        }

        #bg-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 16px;
            background: transparent;
        }

        /* Bakiye Göstergesi Paneli */
        .balance-panel {
            position: absolute;
            top: -70px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(12px);
            padding: 12px 45px;
            border-radius: 60px;
            border: 3px solid #4ade80;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6), 0 0 20px rgba(74, 222, 128, 0.3);
            z-index: 20;
        }

        .balance-text {
            color: #9ca3af;
            font-size: 1.2rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .balance-amount {
            color: #4ade80;
            font-size: 2.5rem;
            font-weight: 900;
            font-variant-numeric: tabular-nums;
        }

        /* Artış Animasyonu */
        .pulse {
            animation: pulse-animation 0.6s ease-out;
        }

        @keyframes pulse-animation {
            0% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.1); filter: brightness(1.3); }
            100% { transform: translateX(-50%) scale(1); }
        }

        #error-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(220, 38, 38, 0.9);
            padding: 12px 25px;
            border-radius: 12px;
            display: none;
            font-weight: 600;
            z-index: 100;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="error-msg">
        ⚠️ 'animasyon.mp4' oynatılamıyor!<br>
        <span style="font-size: 0.8rem; font-weight: 400;">Şu an yedek görsel (görsel.jpg) gösteriliyor.</span>
    </div>

    <div class="video-frame">
        <div class="balance-panel" id="balance-display">
            <span class="balance-text">Bakiye</span>
            <span class="balance-amount"><span id="amount">0</span>₺</span>
        </div>

        <video autoplay muted loop playsinline id="bg-video">
            <source src="animasyon.mp4" type="video/mp4">
            Tarayıcı desteği yok.
        </video>
    </div>

    <script>
        let currentBalance = 0;
        const balanceElement = document.getElementById('amount');
        const container = document.getElementById('balance-display');
        const video = document.getElementById('bg-video');
        const errorMsg = document.getElementById('error-msg');

        function increaseBalance() {
            currentBalance += 8;
            balanceElement.innerText = currentBalance;
            
            container.classList.remove('pulse');
            void container.offsetWidth; 
            container.classList.add('pulse');
        }

        // Bakiye artış döngüsü (8 saniyede bir)
        setInterval(() => {
            increaseBalance();
        }, 8000);

        // Video yükleme hatası kontrolü
        video.onerror = function() {
            console.error("Video hatası oluştu. Yedek görsel devrede.");
            errorMsg.style.display = 'block';
            video.style.display = 'none'; // Videoyu gizle ki arka plandaki görsel.jpg görünsün
        };

        // Otomatik oynatma kısıtlamalarını aşmak için
        window.onload = function() {
            video.load();
            let playPromise = video.play();
            if (playPromise !== undefined) {
                playPromise.catch(error => {
                    console.log("Otomatik oynatma engellendi, etkileşim bekleniyor.");
                    document.body.addEventListener('click', () => {
                        video.play();
                    }, { once: true });
                });
            }
        };
    </script>
</body>
</html>
