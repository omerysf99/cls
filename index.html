<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hızlı Kazan - İşaretle ve Bakiye Al</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;900&display=swap" rel="stylesheet">
    <style>
        body {
            background: #0f172a;
            color: white;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .balance-header {
            width: 100%;
            padding: 30px;
            display: flex;
            justify-content: center;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .balance-box {
            background: #1e293b;
            padding: 15px 40px;
            border-radius: 100px;
            border: 2px solid #22c55e;
            box-shadow: 0 0 30px rgba(34, 197, 94, 0.2);
            text-align: center;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .balance-box.grow {
            transform: scale(1.1);
        }

        .main-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 40px;
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        /* Tıklama Alanı Tasarımı */
        .captcha-row {
            background: white;
            padding: 20px;
            border-radius: 4px;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            cursor: pointer;
            user-select: none;
            transition: all 0.2s;
        }

        .captcha-row:hover {
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .check-box {
            width: 32px;
            height: 32px;
            border: 2px solid #c1c1c1;
            border-radius: 2px;
            position: relative;
            background: #fafafa;
            transition: all 0.1s;
        }

        .check-box.loading {
            border-radius: 50%;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #4a90e2;
            animation: spin 0.8s linear infinite;
        }

        .check-box.done {
            background: #22c55e;
            border-color: #22c55e;
        }

        .check-box.done::after {
            content: '✓';
            color: white;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: bold;
            font-size: 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .info-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 16px;
            text-align: center;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="balance-header">
        <div class="balance-box" id="balance-box">
            <div class="text-xs text-gray-400 uppercase font-bold tracking-widest">Cüzdan Bakiyesi</div>
            <div class="text-4xl font-black text-green-400"><span id="amount">0.00</span> ₺</div>
        </div>
    </div>

    <div class="main-container">
        <div class="text-center">
            <h1 class="text-3xl font-black mb-2">Hızlı İşaretle Kazan</h1>
            <p class="text-gray-400">Her doğrulama için <span class="text-green-400 font-bold">0.25 ₺</span> kazanırsın.</p>
        </div>

        <!-- Tıklanabilir Alan -->
        <div class="captcha-row" id="captcha-btn">
            <div class="checkbox-container">
                <div class="check-box" id="check-box"></div>
                <span class="text-gray-700 text-lg font-medium">Ben robot değilim</span>
            </div>
            <div class="flex flex-col items-center">
                <img src="https://upload.wikimedia.org/wikipedia/commons/a/ad/RecaptchaLogo.svg" width="35" alt="reCAPTCHA">
                <span class="text-[10px] text-gray-400 mt-1">Gizlilik - Şartlar</span>
            </div>
        </div>

        <div class="info-card">
            <div class="flex justify-around">
                <div>
                    <div class="text-2xl font-bold text-white">4.8k</div>
                    <div class="text-xs text-gray-500 uppercase">Aktif Kullanıcı</div>
                </div>
                <div>
                    <div class="text-2xl font-bold text-white">50₺</div>
                    <div class="text-xs text-gray-500 uppercase">Min. Ödeme</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let balance = 0;
        let isProcessing = false;
        const amountDisplay = document.getElementById('amount');
        const balanceBox = document.getElementById('balance-box');
        const captchaBtn = document.getElementById('captcha-btn');
        const checkBox = document.getElementById('check-box');

        captchaBtn.addEventListener('click', () => {
            if (isProcessing) return;
            
            isProcessing = true;
            
            // 1. Aşama: Yükleme efekti
            checkBox.classList.add('loading');
            
            setTimeout(() => {
                // 2. Aşama: Başarılı işareti
                checkBox.classList.remove('loading');
                checkBox.classList.add('done');
                
                // 3. Aşama: Bakiye güncelleme
                updateBalance();
                
                // 4. Aşama: Sıfırlama (Yeni görev için)
                setTimeout(() => {
                    checkBox.classList.remove('done');
                    isProcessing = false;
                }, 1000);

            }, 600); // 0.6 saniye doğrulama süresi
        });

        function updateBalance() {
            balance += 0.25;
            amountDisplay.innerText = balance.toFixed(2);
            
            // Bakiye kutusunu parlat/büyüt
            balanceBox.classList.add('grow');
            setTimeout(() => balanceBox.classList.remove('grow'), 200);
        }
    </script>
</body>
</html>
