<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video ve Bakiye Sayacı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: black;
            font-family: 'Inter', sans-serif;
        }

        .video-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
        }

        #bg-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Bakiye Göstergesi Stili */
        .balance-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(15px);
            padding: 12px 40px;
            border-radius: 100px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            font-size: 2.5rem;
            font-weight: 800;
            z-index: 10;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .pulse {
            animation: pulse-animation 0.6s ease-out;
        }

        @keyframes pulse-animation {
            0% { transform: translateX(-50%) scale(1); }
            50% { transform: translateX(-50%) scale(1.15); color: #4ade80; text-shadow: 0 0 20px #4ade80; }
            100% { transform: translateX(-50%) scale(1); }
        }
    </style>
</head>
<body>

    <!-- Üst Ortadaki Bakiye Paneli -->
    <div class="balance-container" id="balance-display">
        Bakiye: <span id="amount">0</span>₺
    </div>

    <div class="video-wrapper">
        <video autoplay muted loop playsinline id="bg-video">
            <!-- Dosyalar aynı klasörde olduğu için doğrudan isim yazıyoruz -->
            <source src="animasyon.mp4" type="video/mp4">
            Tarayıcınız video etiketini desteklemiyor.
        </video>
    </div>

    <script>
        let currentBalance = 0;
        const balanceElement = document.getElementById('amount');
        const container = document.getElementById('balance-display');
        const video = document.getElementById('bg-video');

        // Bakiye artırma fonksiyonu
        function increaseBalance() {
            currentBalance += 8;
            balanceElement.innerText = currentBalance;
            
            // Görsel efekt ekle
            container.classList.remove('pulse');
            void container.offsetWidth; // DOM tetikleyici
            container.classList.add('pulse');
        }

        // Video her başa döndüğünde (8 saniye sonunda) bakiye artar
        video.onloop = function() {
            increaseBalance();
        };

        // Garanti olması için 'ended' olayını da dinleyelim (bazı tarayıcılar için)
        video.addEventListener('ended', function() {
            increaseBalance();
        });

        // Sayfa yüklendiğinde videoyu başlat
        window.onload = function() {
            video.play().catch(error => {
                // Tarayıcı otomatik oynatmayı engellerse herhangi bir tıklama ile başlatır
                document.body.addEventListener('click', () => {
                    video.play();
                }, { once: true });
            });
        };
    </script>
</body>
</html>
